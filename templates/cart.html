{% extends 'base.html' %}
{% block content %}
<section style="max-width:800px;margin:0 auto;padding:2rem 1.25rem;">

  <div style="margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
    <div>
      <h1 style="font-size:2rem;font-weight:800;margin-bottom:0.25rem;background:linear-gradient(135deg,#a78bfa,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Your Cart</h1>
      <p style="color:#94a3b8;">Review items before checkout</p>
    </div>
    <a href="/furniture" style="padding:0.55rem 1rem;border:1px solid #334155;border-radius:9px;color:#94a3b8;text-decoration:none;font-size:0.9rem;">
      <i class="fas fa-arrow-left" style="margin-right:6px;"></i>Continue Shopping
    </a>
  </div>

  <!-- Cart items -->
  <div id="cart-container" style="display:grid;gap:0.85rem;"></div>

  <!-- Empty state -->
  <div id="cart-empty" style="display:none;background:#111827;border:1px dashed #334155;border-radius:14px;padding:3rem;text-align:center;color:#94a3b8;">
    <i class="fas fa-shopping-cart" style="font-size:2.5rem;margin-bottom:1rem;display:block;color:#334155;"></i>
    Your cart is empty. <a href="/furniture" style="color:#a78bfa;">Browse furniture</a>
  </div>

  <!-- Summary + checkout -->
  <div id="cart-summary" style="display:none;margin-top:1.5rem;background:#111827;border:1px solid #334155;border-radius:14px;padding:1.25rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <span style="color:#94a3b8;font-size:0.95rem;">Total</span>
      <span id="cart-total" style="font-size:1.4rem;font-weight:800;color:#ddd6fe;"></span>
    </div>
    <button onclick="checkout()" id="checkout-btn"
      style="width:100%;padding:0.85rem;border:none;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;">
      <i class="fas fa-credit-card" style="margin-right:8px;"></i>Place Order
    </button>
  </div>

</section>

<!-- Toast -->
<div id="cart-toast" style="position:fixed;right:18px;bottom:18px;padding:0.75rem 1.1rem;border-radius:10px;font-weight:700;display:none;z-index:1600;"></div>

{% endblock %}

{% block scripts %}
<script>
function formatInr(v) {
  return 'Rs.\u00a0' + Number(v || 0).toLocaleString('en-IN');
}

function showToast(msg, isError) {
  const t = document.getElementById('cart-toast');
  t.textContent = msg;
  t.style.background = isError ? '#ef4444' : '#10b981';
  t.style.color      = isError ? '#fee2e2' : '#052e16';
  t.style.display    = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2400);
}

async function loadCart() {
  const res  = await fetch('/cart');
  const data = await res.json();
  const container = document.getElementById('cart-container');
  const empty     = document.getElementById('cart-empty');
  const summary   = document.getElementById('cart-summary');

  if (!data.length) {
    container.innerHTML = '';
    empty.style.display   = 'block';
    summary.style.display = 'none';
    return;
  }

  empty.style.display   = 'none';
  summary.style.display = 'block';

  let total = 0;
  container.innerHTML = data.map(item => {
    total += item.price * item.quantity;
    return `
      <div style="background:#111827;border:1px solid #334155;border-radius:12px;padding:1rem;
                  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:0.85rem;">
          <div style="width:48px;height:48px;border-radius:10px;background:#1e293b;
                      display:grid;place-items:center;border:1px solid #334155;">
            <i class="fas fa-couch" style="color:#a78bfa;font-size:1.2rem;"></i>
          </div>
          <div>
            <div style="font-weight:700;color:#e2e8f0;">${item.name}</div>
            <div style="color:#94a3b8;font-size:0.85rem;">${formatInr(item.price)} &times; ${item.quantity}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:1rem;">
          <span style="font-weight:700;color:#ddd6fe;">${formatInr(item.price * item.quantity)}</span>
          <button onclick="removeItem(${item.id})"
            style="padding:0.45rem 0.85rem;border:1px solid #ef4444;border-radius:8px;
                   background:transparent;color:#ef4444;cursor:pointer;font-size:0.85rem;">
            <i class="fas fa-trash-alt"></i>
          </button>
        </div>
      </div>`;
  }).join('');

  document.getElementById('cart-total').textContent = formatInr(total);
}

async function removeItem(id) {
  await fetch('/remove-from-cart/' + id, { method: 'POST' });
  loadCart();
}

async function checkout() {
  const btn = document.getElementById('checkout-btn');
  btn.disabled = true;
  btn.textContent = 'Placing order...';
  try {
    const res  = await fetch('/checkout', { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Checkout failed');
    showToast('\u2705 Order placed! Total ' + formatInr(data.total));
    loadCart();
  } catch (err) {
    showToast(err.message || 'Checkout failed', true);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-credit-card" style="margin-right:8px;"></i>Place Order';
  }
}

loadCart();
</script>
{% endblock %}
