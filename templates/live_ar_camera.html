{% extends "base.html" %}
{% block head %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
/* ── Reset & base ── */
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box;}
canvas,video{touch-action:none;}

/* ── Full-screen AR root ── */
#ar-root{
  position:fixed;inset:0;background:#0d0d1a;
  z-index:200;display:flex;flex-direction:column;overflow:hidden;
}

/* ── Video layer ── */
#ar-video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:0;background:#000;
}

/* ── Frozen frame (shown after capture) ── */
#ar-frozen{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:0;display:none;
}

/* ── Three.js canvas overlay ── */
#ar-canvas{
  position:absolute;inset:0;width:100%;height:100%;
  z-index:1;pointer-events:none;
}
#ar-canvas.interactive{pointer-events:auto;}

/* ── Top bar ── */
#ar-topbar{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);
  pointer-events:none;
}
#ar-topbar button,#ar-topbar a{pointer-events:auto;}
.tb-btn{
  background:rgba(255,255,255,0.15);border:none;border-radius:50%;
  width:40px;height:40px;color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);min-width:44px;min-height:44px;
}
#ar-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:.5px;}
#ar-mode-toggle{
  background:rgba(124,58,237,0.85);border:none;border-radius:20px;
  padding:6px 14px;color:#fff;font-size:12px;font-weight:700;cursor:pointer;
  display:none;min-height:44px;
}
#ar-mode-toggle.active{background:#10b981;}

/* ── Viewport (flex-1) ── */
#ar-viewport{position:relative;flex:1;overflow:hidden;}

/* ── Bottom bar ── */
#ar-bottombar{
  position:relative;z-index:10;
  display:flex;align-items:center;justify-content:center;gap:24px;
  padding:20px 24px 28px;
  background:linear-gradient(to top,rgba(0,0,0,0.65),transparent);
}

/* ── Capture button ── */
#capture-btn{
  width:72px;height:72px;border-radius:50%;
  background:#7c3aed;border:4px solid #fff;
  color:#fff;font-size:26px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 24px rgba(124,58,237,.6);
  transition:transform .12s,box-shadow .12s;
  flex-shrink:0;
}
#capture-btn:active{transform:scale(.9);box-shadow:0 2px 12px rgba(124,58,237,.4);}

/* ── Post-capture action buttons ── */
.action-btn{
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);
  color:#fff;border-radius:12px;padding:10px 20px;font-size:13px;font-weight:600;
  cursor:pointer;backdrop-filter:blur(4px);min-height:44px;display:none;
  transition:background .15s;
}
.action-btn:hover{background:rgba(255,255,255,0.25);}
#enable-ar-btn{background:rgba(124,58,237,0.85);border-color:#7c3aed;}
#enable-ar-btn:hover{background:#7c3aed;}

/* ── Furniture selector panel ── */
#furn-panel{
  position:absolute;bottom:0;left:0;right:0;z-index:12;
  background:rgba(26,26,46,0.95);border-top:1px solid #334155;
  padding:12px 16px 20px;display:none;
  backdrop-filter:blur(8px);
}
#furn-panel h4{color:#818cf8;font-size:12px;font-weight:700;margin:0 0 10px;text-transform:uppercase;letter-spacing:.8px;}
#furn-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;}
.furn-btn{
  flex-shrink:0;background:#0f172a;border:2px solid #334155;
  border-radius:12px;padding:10px 14px;color:#e2e8f0;
  font-size:12px;font-weight:600;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  min-width:70px;min-height:70px;transition:border-color .15s,background .15s;
}
.furn-btn:hover,.furn-btn.selected{border-color:#7c3aed;background:rgba(124,58,237,0.15);}
.furn-btn i{font-size:20px;color:#818cf8;}

/* ── Error banner ── */
#ar-error{
  position:absolute;inset:0;z-index:50;
  background:#0d0d1a;display:none;
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
  padding:32px;text-align:center;
}
#ar-error.show{display:flex;}
#ar-error i{font-size:3rem;color:#ef4444;}
#ar-error p{color:#94a3b8;font-size:15px;line-height:1.6;max-width:280px;}
#ar-error button{
  background:#7c3aed;color:#fff;border:none;border-radius:10px;
  padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;min-height:44px;
}

/* ── Guidance hint ── */
#ar-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:11;color:rgba(255,255,255,0.7);font-size:13px;
  background:rgba(0,0,0,0.45);padding:8px 18px;border-radius:20px;
  pointer-events:none;transition:opacity .4s;white-space:nowrap;
}

/* ── Loading spinner ── */
#ar-loading{
  position:absolute;inset:0;z-index:40;background:rgba(13,13,26,.8);
  display:none;align-items:center;justify-content:center;
}
#ar-loading.show{display:flex;}
.spin{width:44px;height:44px;border:3px solid #334155;border-top-color:#7c3aed;
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── Analyse overlay ── */
#analyse-overlay{
  position:absolute;inset:0;z-index:20;background:rgba(0,0,0,.75);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
}
#analyse-overlay.show{display:flex;}
#analyse-overlay p{color:#e2e8f0;font-size:14px;}
#analyse-overlay button{
  background:#7c3aed;color:#fff;border:none;border-radius:10px;
  padding:10px 24px;font-size:14px;font-weight:600;cursor:pointer;min-height:44px;
}
#analyse-overlay .sec-btn{background:transparent;border:1px solid #475569;color:#94a3b8;}
</style>
{% endblock %}

{% block content %}
<div id="ar-root">

  <!-- Top bar -->
  <div id="ar-topbar">
    <a href="/" class="tb-btn" title="Back"><i class="fas fa-arrow-left"></i></a>
    <span id="ar-title">AR Room View</span>
    <button id="ar-mode-toggle" onclick="toggleARMode()">AR OFF</button>
  </div>

  <!-- Viewport -->
  <div id="ar-viewport">
    <!-- Live video -->
    <video id="ar-video" autoplay playsinline muted></video>
    <!-- Frozen frame after capture -->
    <img id="ar-frozen" src="" alt="captured room" />
    <!-- Three.js canvas -->
    <canvas id="ar-canvas"></canvas>

    <!-- Guidance hint -->
    <div id="ar-hint">Point camera at your room</div>

    <!-- Furniture panel -->
    <div id="furn-panel">
      <h4>Place Furniture</h4>
      <div id="furn-grid">
        <button class="furn-btn" data-type="sofa" onclick="selectFurniture('sofa')">
          <i class="fas fa-couch"></i>Sofa
        </button>
        <button class="furn-btn" data-type="table" onclick="selectFurniture('table')">
          <i class="fas fa-table"></i>Table
        </button>
        <button class="furn-btn" data-type="lamp" onclick="selectFurniture('lamp')">
          <i class="fas fa-lightbulb"></i>Lamp
        </button>
        <button class="furn-btn" data-type="shelf" onclick="selectFurniture('shelf')">
          <i class="fas fa-book-open"></i>Shelf
        </button>
      </div>
    </div>

    <!-- Analyse overlay (shown after capture) -->
    <div id="analyse-overlay">
      <p>Room captured! What would you like to do?</p>
      <button onclick="sendToAnalyse()"><i class="fas fa-brain"></i> Analyse Room</button>
      <button class="sec-btn" onclick="closeAnalyseOverlay()">Place Furniture</button>
    </div>

    <!-- Error screen -->
    <div id="ar-error">
      <i class="fas fa-camera-slash"></i>
      <p id="ar-error-msg">Camera permission denied. Please allow camera access and try again.</p>
      <button onclick="retryCamera()">Retry</button>
    </div>

    <!-- Loading -->
    <div id="ar-loading"><div class="spin"></div></div>
  </div>

  <!-- Bottom bar -->
  <div id="ar-bottombar">
    <button class="action-btn" id="retake-btn" onclick="retakePhoto()">
      <i class="fas fa-redo"></i> Retake
    </button>
    <button id="capture-btn" onclick="capturePhoto()">
      <i class="fas fa-camera"></i>
    </button>
    <button class="action-btn" id="enable-ar-btn" onclick="enableAR()">
      <i class="fas fa-cube"></i> Enable AR
    </button>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/camera.js"></script>
{% endblock %}
